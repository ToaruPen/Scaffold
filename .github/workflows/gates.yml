name: gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate-contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Run full verify
        run: make verify
