name: quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Run verify
        run: make verify

  commitlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve commit range
        id: range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            first_commit="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            echo "from=${first_commit}" >> "$GITHUB_OUTPUT"
          else
            echo "from=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
          echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Run commitlint on range
        run: make commitlint-range FROM="${{ steps.range.outputs.from }}" TO="${{ steps.range.outputs.to }}"
