name: scaffold-gates-sample

on:
  pull_request:
  workflow_dispatch:

jobs:
  scaffold-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Customize this path if your synced framework is not at ./framework
      - name: Install dependencies
        run: python -m pip install -r framework/requirements-dev.txt

      - name: Validate gate schemas
        run: check-jsonschema --schemafile https://json-schema.org/draft/2020-12/schema framework/.agent/schemas/*/*.json

      - name: Run gate tests
        run: python3 -m unittest discover -s tests/framework -p "test_validate_*.py"

      # Customize/remove this if your repository does not provide root Makefile targets
      - name: Optional full verify
        run: make verify
