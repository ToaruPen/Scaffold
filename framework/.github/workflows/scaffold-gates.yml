name: scaffold-gates-sample

on:
  pull_request:
  workflow_dispatch:

jobs:
  scaffold-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Customize this path if your synced framework is not at ./framework
      - name: Install dependencies
        run: python -m pip install -r framework/requirements-dev.txt

      - name: Validate gate schemas
        run: check-jsonschema --schemafile https://json-schema.org/draft/2020-12/schema framework/.agent/schemas/*/*.json

      - name: Run gate tests
        run: python3 -m unittest discover -s tests/framework -p "test_*.py"

      # Customize/remove this if your repository does not provide root Makefile targets
      - name: Check verify target
        id: check_verify
        shell: bash
        run: |
          if make -n verify >/dev/null 2>&1; then
            echo "has_verify=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_verify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Optional full verify
        if: steps.check_verify.outputs.has_verify == 'true'
        run: make verify
