version: 2

owners:
  gates: framework/scripts/gates
  lint: framework/scripts/lint
  ci: framework/scripts/ci
  hooks: framework/scripts/hooks
  lib: framework/scripts/lib

contracts:
  - id: research-before-spec
    description: Research artifact exists before PRD/Epic creation
    validator: framework/scripts/gates/validate_research_contract.py
    result_schema: framework/.agent/schemas/gates/research-contract-result.schema.json
    status: implemented

  - id: spec-quality-minimum
    description: PRD/Epic include measurable acceptance criteria and out-of-scope section
    validator: framework/scripts/gates/validate_spec_quality.py
    result_schema: framework/.agent/schemas/gates/spec-quality-result.schema.json
    status: implemented

  - id: issue-change-targets-declared
    description: Issue declares estimated change targets for parallel overlap detection
    validator: framework/scripts/gates/validate_issue_targets.py
    result_schema: framework/.agent/schemas/gates/issue-targets-result.schema.json
    status: implemented

  - id: drift-detection
    description: Declared issue targets and actual changed paths must not drift
    validator: framework/scripts/gates/validate_drift_detection.py
    result_schema: framework/.agent/schemas/gates/drift-detection-result.schema.json
    status: implemented

  - id: scope-lock
    description: Scope identity (issue/branch/pr head/range) must match before high-impact operations
    validator: framework/scripts/gates/validate_scope_lock.py
    result_schema: framework/.agent/schemas/gates/vcs-scope-lock-result.schema.json
    status: implemented

  - id: overlap-safety
    description: Parallel issues must have no overlapping change targets or be serialized
    validator: framework/scripts/gates/validate_overlap_safety.py
    result_schema: framework/.agent/schemas/gates/overlap-safety-result.schema.json
    status: implemented

  - id: estimate-approval
    description: Estimate approval artifact exists and is valid
    validator: framework/scripts/gates/validate_estimate_approval.py
    result_schema: framework/.agent/schemas/gates/estimate-approval-result.schema.json
    status: implemented

  - id: mode-selection-recorded
    description: Implementation mode selection (impl/tdd/custom) and reason are recorded
    validator: framework/scripts/gates/validate_mode_selection.py
    result_schema: framework/.agent/schemas/gates/mode-selection-result.schema.json
    status: implemented

  - id: review-cycle-evidence
    description: review-cycle evidence exists and passes contract checks
    validator: framework/scripts/gates/validate_review_cycle.py
    result_schema: framework/.agent/schemas/gates/review-cycle-result.schema.json
    status: implemented

  - id: final-review-consistency
    description: final-review evidence status and commit/range linkage are consistent
    validator: framework/scripts/gates/validate_final_review.py
    result_schema: framework/.agent/schemas/gates/final-review-result.schema.json
    status: implemented

  - id: review-evidence-link
    description: Review evidence links to current commit/range
    validator: framework/scripts/gates/validate_review_evidence.py
    result_schema: framework/.agent/schemas/gates/review-evidence-link-result.schema.json
    status: implemented

  - id: pr-open-preconditions
    description: PR creation requires required evidence and scope lock validation
    validator: framework/scripts/gates/validate_pr_preconditions.py
    result_schema: framework/.agent/schemas/gates/pr-preconditions-result.schema.json
    status: implemented

  - id: pr-bot-iteration
    description: Bot feedback loop artifacts are normalized and traceable
    validator: framework/scripts/gates/validate_pr_bot_iteration.py
    result_schema: framework/.agent/schemas/gates/pr-bot-iteration-result.schema.json
    status: implemented

  - id: adr-index-consistency
    description: ADR body, JSON index, and decisions index are consistent
    validator: framework/scripts/gates/validate_adr_index.py
    result_schema: framework/.agent/schemas/gates/adr-index-result.schema.json
    status: implemented

  - id: waiver-exception
    description: Exception records are explicit, auditable, and contract-shaped
    validator: framework/scripts/gates/validate_waiver.py
    result_schema: framework/.agent/schemas/gates/waiver-result.schema.json
    status: implemented

must_command_contracts:
  /research:
    requires:
      - research-before-spec

  /create-prd:
    requires:
      - spec-quality-minimum

  /create-epic:
    requires:
      - spec-quality-minimum

  /create-issues:
    requires:
      - issue-change-targets-declared

  /estimation:
    requires:
      - estimate-approval
      - mode-selection-recorded

  /impl:
    requires:
      - estimate-approval
      - mode-selection-recorded

  /tdd:
    requires:
      - estimate-approval
      - mode-selection-recorded

  /worktree:
    requires:
      - scope-lock
      - overlap-safety

  /review-cycle:
    requires:
      - review-cycle-evidence
      - review-evidence-link

  /final-review:
    requires:
      - final-review-consistency
      - drift-detection
      - review-evidence-link
      - adr-index-consistency

  /create-pr:
    requires:
      - scope-lock
      - pr-open-preconditions
      - review-evidence-link

  /pr-bots-review:
    requires:
      - pr-bot-iteration

  /waiver:
    requires:
      - waiver-exception

command_tiers:
  /research: core
  /create-prd: core
  /create-epic: core
  /create-issues: core
  /estimation: core
  /impl: core
  /tdd: core
  /worktree: core
  /review-cycle: core
  /final-review: core
  /create-pr: core
  /pr-bots-review: conditional
  /waiver: conditional

command_metadata:
  /research:
    summary: Create or verify research evidence before PRD or Epic authoring.
    when_to_use: Requirement phase before defining specs or implementation issues.
    next_steps:
      - /create-prd
      - /create-epic

  /create-prd:
    summary: Draft a PRD with measurable acceptance criteria and out-of-scope boundaries.
    when_to_use: After research evidence exists and the problem needs product-level scope.
    next_steps:
      - /create-epic

  /create-epic:
    summary: Turn a PRD into an implementation-ready Epic and issue split.
    when_to_use: After the PRD is stable enough to define engineering work.
    next_steps:
      - /create-issues

  /create-issues:
    summary: Split an Epic into implementation issues with declared change targets.
    when_to_use: When the Epic is ready to become concrete work items.
    next_steps:
      - /worktree

  /estimation:
    summary: Record an approved estimate and select the implementation mode.
    when_to_use: Planning phase after the issue scope and worktree are fixed.
    next_steps:
      - /impl
      - /tdd

  /impl:
    summary: Implement the scoped issue after estimate approval and mode selection.
    when_to_use: Delivery phase when the issue should be solved without a TDD-first loop.
    next_steps:
      - /review-cycle

  /tdd:
    summary: Implement the scoped issue through a red-green-refactor loop.
    when_to_use: Delivery phase when tests should drive the implementation loop.
    next_steps:
      - /review-cycle

  /worktree:
    summary: Create or inspect an issue worktree and verify scope-lock and overlap safety.
    when_to_use: Before parallel implementation starts for an issue-scoped branch.
    next_steps:
      - /estimation

  /review-cycle:
    summary: Run the local review loop and refresh review evidence for the current diff.
    when_to_use: After implementation changes are ready for structured review feedback.
    next_steps:
      - /final-review

  /final-review:
    summary: Validate final review consistency, drift detection, and ADR linkage before opening a PR.
    when_to_use: After review-cycle passes and the branch is nearly ready to publish.
    next_steps:
      - /create-pr
      - /waiver

  /create-pr:
    summary: Open or update a PR after scope lock and review evidence are current.
    when_to_use: When the branch is ready to publish for CI and external review.
    next_steps:
      - /pr-bots-review

  /pr-bots-review:
    summary: Iterate on bot feedback until the published PR is ready for human review.
    when_to_use: After a PR exists and automated review bots can inspect the diff.
    next_steps:
      - /review-cycle
      - /final-review

  /waiver:
    summary: Record an explicit exception when a gate cannot be satisfied normally.
    when_to_use: Only when a documented exception is needed to keep the flow auditable.
    next_steps:
      - /final-review

adapter_interfaces:
  review_engine:
    contract_doc: framework/docs/contract/adapter-interfaces.md#review-engine-adapter
    result_schema: framework/.agent/schemas/adapters/review-engine-result.schema.json
    error_schema: framework/.agent/schemas/common/adapter-error.schema.json
    stub_impl: framework/scripts/lib/review_engine_stub.py

  vcs:
    contract_doc: framework/docs/contract/adapter-interfaces.md#vcs-adapter
    scope_lock_schema: framework/.agent/schemas/gates/vcs-scope-lock-result.schema.json
    overlap_safety_schema: framework/.agent/schemas/gates/overlap-safety-result.schema.json
    error_schema: framework/.agent/schemas/common/adapter-error.schema.json
    stub_impl: framework/scripts/lib/vcs_stub.py

  bot:
    contract_doc: framework/docs/contract/adapter-interfaces.md#bot-adapter
    feedback_schema: framework/.agent/schemas/adapters/bot-feedback-batch.schema.json
    error_schema: framework/.agent/schemas/common/adapter-error.schema.json
    stub_impl: framework/scripts/lib/bot_stub.py
