[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "W",
  "B",
  "PLE",
  "UP",
  "RUF",
  "C4",
  "C90",
  "SIM",
  "PLC",
  "PLW",
  "ANN",
  "PLR",
]
ignore = [
  "W191",
  "E111",
  "E114",
  "E117",
  "D206",
  "D300",
  "Q000",
  "Q001",
  "Q002",
  "Q003",
  "COM812",
  "COM819",
  "ISC002",
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"framework/scripts/gates/validate_*.py" = ["E402"]
"framework/scripts/ci/run_*_review.py" = ["E402"]
# issue-27: reduce complexity in generate_markdown_command_exports.py
"tooling/sync/generate_markdown_command_exports.py" = ["C901", "PLR0912", "PLR0913", "SIM102", "SIM108"]
# issue-28: simplify command_surface_loader.py
"tooling/sync/lib/command_surface_loader.py" = ["ANN401", "C901", "PLR0912", "PLR0915"]

[tool.mypy]
python_version = "3.11"
files = [
  "framework/scripts/gates",
  "framework/scripts/lib",
  "framework/scripts/ci",
  "tests/framework",
  "tooling/sync",
  "tests/tooling",
]
strict = true
namespace_packages = true
explicit_package_bases = true
warn_unused_configs = true
disallow_any_generics = true
show_error_codes = true
